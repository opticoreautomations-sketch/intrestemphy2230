services:
  - type: web
    name: physics-platform
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/physics.db
      - key: UPLOADS_PATH
        value: /var/data/uploads
    disk:
      name: physics-data
      mountPath: /var/data
      sizeGB: 1
